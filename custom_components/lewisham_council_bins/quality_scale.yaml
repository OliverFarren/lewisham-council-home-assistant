rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration registers no service actions.
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: No service actions provided.
  docs-conditions:
    status: exempt
    comment: Integration provides no custom conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: Integration provides no custom triggers.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: No service actions provided.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: No configuration options are offered post-setup.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Data source is public; no authentication is required.
  test-coverage: done

  # Gold
  devices: done
  diagnostics: todo
  discovery:
    status: exempt
    comment: A council web service cannot be network-discovered.
  discovery-update-info:
    status: exempt
    comment: No discovered network devices to update.
  docs-data-update: done
  docs-examples: todo
  docs-known-limitations: done
  docs-supported-devices:
    status: exempt
    comment: Integration exposes a service, not physical devices.
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: One device per address (config entry); no sub-devices appear at runtime.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: exempt
    comment: All entities are primary and useful; none are noisy.
  entity-translations: todo
  exception-translations: todo
  icon-translations: todo
  reconfiguration-flow: todo
  repair-issues:
    status: exempt
    comment: No user-actionable repair conditions at present.
  stale-devices:
    status: exempt
    comment: Device lifecycle is tied 1:1 to the config entry.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo     # confirm client ships py.typed
